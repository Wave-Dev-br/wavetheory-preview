m 5 shapes (C-A-G-E-D) que se encaixam e cobrem o bra\xE7o inteiro para qualquer acorde.",como:'Selecione um shape nos bot\xF5es C A G E D ou navegue com \u25C0 \u25B6. O bra\xE7o destaca a janela do shape ativo; "Todos os 5 shapes" mostra como eles se conectam em sequ\xEAncia.',quando:"Para tocar o mesmo acorde em qualquer regi\xE3o do bra\xE7o, ou improvisar mudando de posi\xE7\xE3o sem se perder.",porque:"Decorar 5 formas conectadas \xE9 mais eficiente que decorar dezenas de acordes soltos \u2014 o bra\xE7o vira um mapa cont\xEDnuo."},funcoes:{oQue:"O Mapa das Fun\xE7\xF5es agrupa os acordes do campo por papel: T\xF4nica (repouso), Subdominante (expans\xE3o) e Dominante (tens\xE3o) \u2014 o acorde principal e os relativos de cada fam\xEDlia.",como:"A t\xF4nica, o modo e o enriquecimento v\xEAm das suas sele\xE7\xF5es (o shape escolhido define Tr\xEDades/S\xE9timas/Noves). Clique \u25B6 em qualquer acorde para ouvir; no montador, escolha qual acorde ocupa cada fun\xE7\xE3o da progress\xE3o.",quando:"Na hora de compor: escolha a emo\xE7\xE3o do momento (descansar, abrir, tensionar) e o mapa mostra quais acordes cumprem esse papel.",porque:"Pensar por fun\xE7\xE3o liberta da progress\xE3o decorada \u2014 qualquer acorde da fam\xEDlia cumpre o papel, e trocar dentro da fam\xEDlia \xE9 o segredo dos rearranjos."},orbitas:{oQue:"As \xD3rbitas mostram a gravidade das fun\xE7\xF5es: a t\xF4nica \xE9 o centro, e cada acorde orbita mais perto (repouso) ou mais longe (tens\xE3o) dela.",como:'Mesmas sele\xE7\xF5es da roda: t\xF4nica, modo e enriquecimento pelo shape. Clique num astro para ouvir; "Sentir a resolu\xE7\xE3o" toca V \u2192 I. Dist\xE2ncia = fun\xE7\xE3o \xB7 tamanho = estabilidade \xB7 linha animada = atra\xE7\xE3o pra casa.',quando:"Para SENTIR por que a dominante pede resolu\xE7\xE3o e por que a subdominante \xE9 s\xF3 um respiro \u2014 antes de decorar nomes.",porque:"A met\xE1fora f\xEDsica (gravidade, \xF3rbita, queda) \xE9 exatamente como a harmonia funcio
